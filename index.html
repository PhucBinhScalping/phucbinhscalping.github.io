<!DOCTYPE html>

<head>

    <title>Phuc Binh Scalping - Bio Link</title>
    <style>
        /* CSS Giao diện */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00ffcc;
            object-fit: cover;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 25px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .link-card:hover {
            background: #00ffcc;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>

    <div class="container">
