<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Thêm Mã Linh Hoạt</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff; color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Thanh Header chính */
        .header {
            height: 45px; background-color: #f0f3fa; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #e0e3eb; box-sizing: border-box;
        }
        .header .back-link {
            color: #e65100; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        
        /* Thanh Menu Tab Con */
        .tab-menu {
            height: 40px; background-color: #ffffff; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #e0e3eb; box-sizing: border-box;
        }
        .tab-item {
            background: none; border: none; color: #474f66; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover { background-color: #f0f3fa; color: #131722; }
        .tab-item.active {
            background-color: #e3f2fd; color: #1565c0; border-bottom: 2px solid #1565c0;
            border-radius: 4px 4px 0 0;
        }

        /* Nút Dấu Cộng Thêm Biểu Đồ */
        .btn-add-tab {
            background-color: #2e7d32; color: white; border: none;
            width: 28px; height: 28px; font-size: 18px; font-weight: bold;
            cursor: pointer; border-radius: 4px; display: flex;
            align-items: center; justify-content: center; margin-left: 5px;
            transition: 0.2s;
        }
        .btn-add-tab:hover { background-color: #1b5e20; }

        /* Vùng nội dung chia đôi */
        .content-container {
            flex: 1; width: 100%; height: calc(100% - 85px); 
            display: flex; flex-direction: row; background-color: #ffffff;
        }
        
        /* Phân vùng Tab */
        .tab-content-block {
            display: none; width: 100%; height: 100%; flex-direction: row;
        }
        .tab-content-block.active {
            display: flex;
        }

        /* KHU VỰC BIỂU ĐỒ BÊN TRÁI */
        .chart-section { flex: 1; height: 100%; }

        /* KHU VỰC SIDEBAR BẢNG GIÁ TỰ CHẾ (Theme Light) */
        .sidebar-section { 
            width: 360px; 
            height: 100%; 
            border-left: 1px solid #e0e3eb; 
            background-color: #ffffff; 
            box-sizing: border-box;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
        }

        /* Thiết kế widget thủ công theo tông màu sáng */
        .vps-widget-header {
            font-size: 28px; font-weight: bold; color: #00c853; margin-bottom: 2px;
        }
        .vps-widget-sub {
            font-size: 13px; color: #707a8a; margin-bottom: 20px;
        }
        .vps-main-price {
            font-size: 54px; font-weight: bold; color: #00c853; 
            font-family: 'Impact', Arial, sans-serif; margin-bottom: 5px;
        }
        .vps-change {
            font-size: 16px; font-weight: bold; color: #00c853; margin-bottom: 25px;
        }
        
        /* Bảng thông số chi tiết phía dưới */
        .info-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #f0f3fa; font-size: 14px;
        }
        .info-label { color: #707a8a; }
        .info-value { font-weight: 600; color: #1e222d; }
        
        /* Định nghĩa màu sắc kỹ thuật chứng khoán trên nền sáng */
        .color-up { color: #00c853 !important; }     
        .color-down { color: #d50000 !important; }   
        .color-ref { color: #ffaa00 !important; }    

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link" style="flex: 1; text-align: left;color: #ffb700;">⬅ Quay lại Trang chủ</a>
        <div style="flex: 2; text-align: center; font-size: 18px; font-weight: 500; color: #ffb700; letter-spacing: 0.5px;">
             Dữ liệu được lấy trực tiếp từ Công ty Cổ phần Chứng khoán VPS
        </div>
        <div style="flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #ffb700;">

            SĐT: 0853.525.379 - ID VPS: BOR5
        </div>
    </div>

    <!-- Thanh menu chứa các Tab và Nút Dấu Cộng -->
    <div class="tab-menu" id="tabMenuContainer">
        <button class="tab-item active" onclick="switchTab(event, 'block_vn30f1m_5m', 'VN30F1M', 'VN30 Index Futures Gần nhất')">📊 VN30F1M (5P)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vn30f1m_15m', 'VN30F1M', 'VN30 Index Futures Gần nhất')">📊 VN30F1M (15P)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vnindex', 'VNINDEX', 'Chỉ số VN-Index Việt Nam')">📈 VNINDEX (Ngày)</button>
        
        <!-- Nút dấu cộng thêm biểu đồ -->
        <button class="btn-add-tab" onclick="addNewChartPrompt()" title="Thêm biểu đồ mã mới">+</button>
    </div>

    <div class="content-container" id="contentContainer">
        
        <!-- Tab 1: VN30F1M Khung 5 Phút -->
        <div id="block_vn30f1m_5m" class="tab-content-block active">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <!-- Tab 2: VN30F1M Khung 15 Phút -->
        <div id="block_vn30f1m_15m" class="tab-content-block">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=15&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <!-- Tab 3: VNINDEX Khung Ngày -->
        <div id="block_vnindex" class="tab-content-block">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VNINDEX&interval=D&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <!-- SIDEBAR HIỂN THỊ DỮ LIỆU VPS THEME LIGHT -->
        <div class="sidebar-section">
            <div id="widget_symbol" class="vps-widget-header">VN30F1M</div>
            <div id="widget_desc" class="vps-widget-sub">VN30 Index Futures Gần nhất</div>
            
            <div id="widget_price" class="vps-main-price">---.--</div>
            <div id="widget_change" class="vps-change">--.-- (--.--%)</div>
            
            <!-- Khu vực bảng chi tiết -->
            <div class="info-row">
                <span class="info-label">Mở cửa</span>
                <span id="val_open" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Cao nhất</span>
                <span id="val_high" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Thấp nhất</span>
                <span id="val_low" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Giá đóng cửa cũ</span>
                <span id="val_prev" class="info-value">---.--</span>
            </div>
            <div style="font-size: 11px; color: #90a4ae; text-align: center; margin-top: 30px;">
                ● Kết nối trực tiếp Dữ liệu hệ thống VPS (Light Mode)
            </div>
        </div>

    </div>

    <script>
        let currentSymbol = 'VN30F1M';
        let apiInterval = null;
        let dynamicTabCount = 0;

        function switchTab(event, blockId, symbol, desc) {
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            
            // Nếu click trực tiếp từ tab, kích hoạt active
            if(event) {
                event.currentTarget.classList.add('active');
            } else {
                // Trường hợp kích hoạt tự động cho tab mới tạo
                const tabs = document.querySelectorAll('.tab-item');
                tabs[tabs.length - 1].classList.add('active');
            }
            
            document.querySelectorAll('.tab-content-block').forEach(block => block.classList.remove('active'));
            document.getElementById(blockId).classList.add('active');
            
            currentSymbol = symbol.toUpperCase();
            document.getElementById('widget_symbol').innerText = currentSymbol;
            document.getElementById('widget_desc').innerText = desc;
            
            resetWidgetData();
            fetchVPSData();
        }

        function resetWidgetData() {
            document.getElementById('widget_price').innerText = "⏳...";
            document.getElementById('widget_change').innerText = "--.-- (--.--%)";
            document.getElementById('val_open').innerText = "---.--";
            document.getElementById('val_high').innerText = "---.--";
            document.getElementById('val_low').innerText = "---.--";
            document.getElementById('val_prev').innerText = "---.--";
        }

        // HÀM XỬ LÝ KHI BẤM NÚT DẤU CỘNG
        function addNewChartPrompt() {
            let symbolInput = prompt("Nhập mã chứng khoán hoặc phái sinh muốn thêm:\n(Ví dụ: HPG, FPT, TCB, VN30F2M, v.v.)");
            
            if (!symbolInput) return; // Nếu bấm hủy bỏ hoặc không nhập gì
            
            let symbol = symbolInput.trim().toUpperCase();
            dynamicTabCount++;
            
            let blockId = `block_dynamic_${symbol}_${dynamicTabCount}`;
            let tabDesc = `Cổ phiếu ${symbol} niêm yết`;
            if(symbol.includes("VN30F")) tabDesc = "Hợp đồng tương lai Phái sinh";

            // 1. Tạo nút bấm Tab mới và chèn vào trước nút dấu cộng
            let newTabBtn = document.createElement('button');
            newTabBtn.className = 'tab-item';
            newTabBtn.innerHTML = `📊 ${symbol} (5P)`;
            newTabBtn.onclick = function(e) {
                switchTab(e, blockId, symbol, tabDesc);
            };
            
            let menuContainer = document.getElementById('tabMenuContainer');
            let addButton = menuContainer.lastElementChild;
            menuContainer.insertBefore(newTabBtn, addButton);

            // 2. Tạo vùng chứa Iframe đồ thị mới
            let newBlock = document.createElement('div');
            newBlock.id = blockId;
            newBlock.className = 'tab-content-block';
            newBlock.innerHTML = `
                <div class="chart-section">
                    <iframe src="https://web5.vps.com.vn/?sym=${symbol}&interval=5&theme=light&lang=vi"></iframe>
                </div>
            `;
            
            let contentContainer = document.getElementById('contentContainer');
            let sidebar = contentContainer.lastElementChild;
            contentContainer.insertBefore(newBlock, sidebar);

            // 3. Tự động chuyển hướng xem ngay tab vừa tạo
            switchTab(null, blockId, symbol, tabDesc);
        }

        async function fetchVPSData() {
            try {
                const toTime = Math.floor(Date.now() / 1000);
                const fromTime = toTime - 16 * 3600; 

                const url = `https://histdatafeed.vps.com.vn/tradingview/history?symbol=${currentSymbol}&resolution=1&from=${fromTime}&to=${toTime}&countback=500`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.s === "ok" && data.c && data.c.length > 1) {
                    const len = data.c.length;
                    
                    const currentPrice = data.c[len - 1];
                    const sessionOpenPrice = data.o[0];
                    
                    let sessionHighPrice = data.h[0];
                    let sessionLowPrice = data.l[0];
                    
                    for (let i = 0; i < len; i++) {
                        if (data.h[i] > sessionHighPrice) sessionHighPrice = data.h[i];
                        if (data.l[i] < sessionLowPrice) sessionLowPrice = data.l[i];
                    }
                    
                    const prevPrice = data.c[0]; 
                    
                    const diff = currentPrice - prevPrice;
                    const pct = (diff / prevPrice) * 100;
                    const prefix = diff > 0 ? "↑ +" : (diff < 0 ? "↓ " : "");
                    
                    let tradeColor = "color-ref";
                    if (diff > 0) tradeColor = "color-up";
                    if (diff < 0) tradeColor = "color-down";
                    
                    const pEl = document.getElementById('widget_price');
                    const cEl = document.getElementById('widget_change');
                    
                    // Xử lý định dạng hiển thị giá (Cổ phiếu cơ sở thường cần chia 1000 hoặc hiển thị theo bước giá, ở đây giữ nguyên gốc tỷ lệ gốc VPS)
                    pEl.innerText = Number(currentPrice).toFixed(2);
                    pEl.className = `vps-main-price ${tradeColor}`;
                    document.getElementById('widget_symbol').className = `vps-widget-header ${tradeColor}`;
                    
                    cEl.innerText = `${prefix}${diff.toFixed(2)} (${prefix ? '' : ''}${pct.toFixed(2)}%)`;
                    cEl.className = `vps-change ${tradeColor}`;
                    
                    document.getElementById('val_open').innerText = Number(sessionOpenPrice).toFixed(2);
                    document.getElementById('val_high').innerText = Number(sessionHighPrice).toFixed(2);
                    document.getElementById('val_low').innerText = Number(sessionLowPrice).toFixed(2);
                    document.getElementById('val_prev').innerText = Number(prevPrice).toFixed(2);
                }
            } catch (err) {
                console.error("Lỗi đồng bộ dữ liệu VPS:", err);
            }
        }

        apiInterval = setInterval(fetchVPSData, 2000);
        fetchVPSData();
    </script>
</body>
</html>
