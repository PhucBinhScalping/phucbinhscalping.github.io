<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Thanh Header chính */
        .header {
            height: 45px; background-color: #1c2030; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #2b3040; box-sizing: border-box;
        }
        .header .back-link {
            text-decoration: none; font-weight: bold; font-size: 14px;
        }
        
        /* Thanh Menu Tab Con */
        .tab-menu {
            height: 40px; background-color: #171b26; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #232733; box-sizing: border-box;
        }
        .tab-item {
            background: none; border: none; color: #d1d4dc; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover { background-color: #2a2e39; color: #ffffff; }
        .tab-item.active {
            background-color: #242b42; color: #2962ff; border-bottom: 2px solid #2962ff;
            border-radius: 4px 4px 0 0;
        }

        /* Vùng nội dung chia đôi */
        .content-container {
            flex: 1; width: 100%; height: calc(100% - 85px); 
            display: flex; flex-direction: row; background-color: #131722;
        }
        
        /* Phân vùng Tab */
        .tab-content-block {
            display: none; width: 100%; height: 100%; flex-direction: row;
        }
        .tab-content-block.active {
            display: flex;
        }

        /* KHU VỰC BIỂU ĐỒ BÊN TRÁI */
        .chart-section { flex: 1; height: 100%; }

        /* KHU VỰC HIỂN THỊ WIDGET BÊN PHẢI (THEME TỐI) */
        .sidebar-section { 
            width: 360px; height: 100%; border-left: 1px solid #2b3040; 
            background-color: #171b26; box-sizing: border-box;
            padding: 25px 20px; display: flex; flex-direction: column;
        }
        
        .vps-widget-header {
            font-size: 32px; font-weight: bold; color: #00e676; margin-bottom: 4px;
        }
        .vps-widget-sub {
            font-size: 13px; color: #848e9c; margin-bottom: 20px;
        }
        
        /* Định dạng số mảnh chuẩn phong cách TradingView */
        .vps-main-price {
            font-size: 52px; font-weight: 500; color: #00e676; 
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, sans-serif;
            margin-bottom: 5px; letter-spacing: -1px;
        }
        .vps-change {
            font-size: 16px; font-weight: bold; color: #00e676; margin-bottom: 30px;
        }
        
        /* Danh sách thông số chi tiết bóc tách từ Datafeed */
        .info-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #232733; font-size: 14px;
        }
        .info-label { color: #848e9c; }
        .info-value { font-weight: 600; color: #e1e3e6; }
        
        /* Bảng màu chuẩn kỹ thuật sàn chứng khoán */
        .color-up { color: #00e676 !important; text-shadow: 0px 0px 10px rgba(0,230,118,0.2); }     
        .color-down { color: #ff3d00 !important; text-shadow: 0px 0px 10px rgba(255,61,0,0.2); }   
        .color-ref { color: #ffb700 !important; }    

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link" style="flex: 1; text-align: left; color: #e65100;">⬅ Quay lại Trang chủ</a>
        <div style="flex: 2; text-align: center; font-size: 18px; font-weight: bold; color: #e65100; letter-spacing: 0.5px;">
             Dữ liệu được lấy trực tiếp từ Công ty Cổ phần Chứng khoán VPS
        </div>
        <div style="flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #e65100;">
            SĐT: 0853.525.379 - ID VPS: BOR5
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-item active" onclick="switchTab(event, 'block_vn30f1m_5m', 'VN30F1M')">📊 VN30F1M (5 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vn30f1m_15m', 'VN30F1M')">📊 VN30F1M (15 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vnindex', 'VNINDEX')">📈 VNINDEX (Ngày)</button>
    </div>

    <div class="content-container">
        
        <div id="block_vn30f1m_5m" class="tab-content-block active">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <div id="block_vn30f1m_15m" class="tab-content-block">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=15&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <div id="block_vnindex" class="tab-content-block">
            <div class="chart-section">
                <iframe src="https://web5.vps.com.vn/?sym=VNINDEX&interval=D&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <div class="sidebar-section">
            <div id="display_symbol" class="vps-widget-header">VN30F1M</div>
            <div id="display_desc" class="vps-widget-sub">Hợp đồng tương lai chỉ số VN30</div>
            
            <div id="display_price" class="vps-main-price">---.--</div>
            <div id="display_change" class="vps-change">--.-- (--.--%)</div>
            
            <div class="info-row">
                <span class="info-label">Mở cửa</span>
                <span id="val_open" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Cao nhất</span>
                <span id="val_high" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Thấp nhất</span>
                <span id="val_low" class="info-value">---.--</span>
            </div>
            <div class="info-row">
                <span class="info-label">Tham chiếu</span>
                <span id="val_prev" class="info-value">---.--</span>
            </div>
            <div style="font-size: 11px; color: #474f66; text-align: center; margin-top: 30px;">
                ● Kết nối trực tiếp DataFeed VPS real-time
            </div>
        </div>

    </div>

<script>
        let currentSymbol = 'VN30F1M';
        let apiInterval = null;

        window.onload = function() {
            fetchVPSData();
            apiInterval = setInterval(fetchVPSData, 2000); // Cập nhật liên tục mỗi 2 giây
        };

        function switchTab(event, blockId, symbol) {
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.querySelectorAll('.tab-content-block').forEach(block => block.classList.remove('active'));
            document.getElementById(blockId).classList.add('active');
            
            currentSymbol = symbol;
            document.getElementById('display_symbol').innerText = symbol;
            document.getElementById('display_desc').innerText = symbol === 'VN30F1M' ? "Hợp đồng tương lai chỉ số VN30" : "Chỉ số VN-Index Việt Nam";
            
            document.getElementById('display_price').innerText = "⏳...";
            document.getElementById('display_change').innerText = "--.-- (--.--%)";
            
            fetchVPSData();
        }

        async function fetchVPSData() {
            try {
                // Lấy mốc thời gian thực hiện tại
                const toTime = Math.floor(Date.now() / 1000);
                // Lùi hẳn về 24h trước để quét trọn vẹn dữ liệu từ lúc mở cửa phiên sáng
                const fromTime = toTime - 86400; 

                const url = `https://histdatafeed.vps.com.vn/tradingview/history?symbol=${currentSymbol}&resolution=1&from=${fromTime}&to=${toTime}&countback=500`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.s === "ok" && data.c && data.c.length > 0) {
                    const len = data.c.length;
                    const currentPrice = data.c[len - 1]; // Giá khớp real-time mới nhất
                    const sessionOpenPrice = data.o[0];    // Giá mở cửa chuẩn của phiên
                    
                    // Thuật toán quét chính xác giá Cao nhất và Thấp nhất từ đầu ngày
                    let sessionHighPrice = data.h[0];
                    let sessionLowPrice = data.l[0];
                    for (let i = 0; i < len; i++) {
                        if (data.h[i] > sessionHighPrice) sessionHighPrice = data.h[i];
                        if (data.l[i] < sessionLowPrice) sessionLowPrice = data.l[i];
                    }
                    
                    // Lấy giá đóng cửa của cây nến đầu tiên trong chuỗi dữ liệu làm mốc Tham chiếu tạm thời
                    const referencePrice = data.o[0]; 
                    const diff = currentPrice - referencePrice;
                    const pct = (diff / referencePrice) * 100;
                    const prefix = diff > 0 ? "↑ +" : (diff < 0 ? "↓ " : "");
                    
                    // Đổi màu chữ theo trạng thái giá
                    let tradeColor = "color-ref";
                    if (diff > 0) tradeColor = "color-up";   // Tăng - Xanh lá
                    if (diff < 0) tradeColor = "color-down"; // Giảm - Đỏ
                    
                    const pEl = document.getElementById('display_price');
                    const cEl = document.getElementById('display_change');
                    
                    // Hiển thị số mảnh lên màn hình Live
                    pEl.innerText = Number(currentPrice).toFixed(2);
                    pEl.className = `vps-main-price ${tradeColor}`;
                    document.getElementById('display_symbol').className = `vps-widget-header ${tradeColor}`;
                    
                    cEl.innerText = `${prefix}${diff.toFixed(2)} (${pct.toFixed(2)}%)`;
                    cEl.className = `vps-change ${tradeColor}`;
                    
                    // Đồng bộ 4 thông số kỹ thuật bên dưới sidebar
                    document.getElementById('val_open').innerText = Number(sessionOpenPrice).toFixed(2);
                    document.getElementById('val_high').innerText = Number(sessionHighPrice).toFixed(2);
                    document.getElementById('val_low').innerText = Number(sessionLowPrice).toFixed(2);
                    document.getElementById('val_prev').innerText = Number(referencePrice).toFixed(2);
                }
            } catch (err) {
                console.error("Lỗi kết nối DataFeed VPS:", err);
            }
        }
    </script>
</body>
</html>
