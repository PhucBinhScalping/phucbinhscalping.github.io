<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff; color: #131722; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            height: 45px; background-color: #f0f3fa; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #e0e3eb; box-sizing: border-box;
        }
        .header .back-link {
            text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .tab-menu {
            height: 40px; background-color: #ffffff; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #e0e3eb; box-sizing: border-box;
        }
        .tab-item {
            background: none; border: none; color: #474f66; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover { background-color: #f0f3fa; color: #131722; }
        .tab-item.active {
            background-color: #e3f2fd; color: #1565c0; border-bottom: 2px solid #1565c0;
            border-radius: 4px 4px 0 0;
        }
        .btn-add {
            background-color: #e8f5e9; color: #2e7d32; border: 1px dashed #2e7d32;
            padding: 5px 12px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        .content-container {
            flex: 1; width: 100%; height: calc(100% - 85px); 
            display: flex; flex-direction: row; background-color: #ffffff;
        }
        .tab-content-block {
            display: none; width: 100%; height: 100%; flex-direction: row;
        }
        .tab-content-block.active {
            display: flex;
        }
        .chart-section { flex: 1; height: 100%; }
        .sidebar-section { 
            width: 360px; height: 100%; border-left: 1px solid #e0e3eb; 
            background-color: #ffffff; box-sizing: border-box;
            padding: 25px 20px; display: flex; flex-direction: column;
        }
        .vps-widget-header {
            font-size: 32px; font-weight: bold; color: #00c853; margin-bottom: 4px;
        }
        .vps-widget-sub {
            font-size: 13px; color: #707a8a; margin-bottom: 20px;
        }
        .vps-main-price {
            font-size: 52px; font-weight: 500; color: #00c853; 
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, sans-serif;
            margin-bottom: 5px; letter-spacing: -1px;
        }
        .vps-change {
            font-size: 16px; font-weight: bold; color: #00c853; margin-bottom: 30px;
        }
        .info-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid #f0f3fa; font-size: 14px;
        }
        .info-label { color: #707a8a; }
        .info-value { font-weight: 600; color: #1e222d; }
        .color-up { color: #00c853 !important; }    
        .color-down { color: #d50000 !important; }   
        .color-ref { color: #ffaa00 !important; }    
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { 
            margin-left: 10px; 
            cursor: pointer; 
            color: red; 
            font-weight: bold; 
            display: inline-block; 
            padding: 2px 5px;
            z-index: 100;
        }
        .close-btn:hover { background: #ffcdd2; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link" style="flex: 1; text-align: left; color: #ffb700;">⬅ Quay lại Trang chủ</a>
        <div style="flex: 2; text-align: center; font-size: 18px; font-weight: bold; color: #ffb700; letter-spacing: 0.5px;">
             Dữ liệu được lấy trực tiếp từ Công ty Cổ phần Chứng khoán VPS
        </div>
        <div style="flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #ffb700;">
            SĐT: 0853.525.379 - ID VPS: BOR5
        </div>
    </div>

    <div class="tab-menu" id="mainTabMenu">
        <button class="tab-item active" id="tab_base" onclick="switchTab(event, 'block_vn30f1m_5m', 'VN30F1M')">📊 VN30F1M (5 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vn30f1m_15m', 'VN30F1M')">📊 VN30F1M (15 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'block_vnindex', 'VNINDEX')">📈 VNINDEX (Ngày)</button>
        <button class="btn-add" onclick="addNewChart()">+ Thêm biểu đồ</button>
    </div>

    <div class="content-container" id="mainContent">
        <div id="block_vn30f1m_5m" class="tab-content-block active">
            <div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=VN30F1M&allowFullscreen=true&resolution=5&lang=vi&theme=light"></iframe></div>
        </div>
        <div id="block_vn30f1m_15m" class="tab-content-block">
            <div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=VN30F1M&allowFullscreen=true&resolution=15&lang=vi&theme=light"></iframe></div>
        </div>
        <div id="block_vnindex" class="tab-content-block">
            <div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=VNINDEX&allowFullscreen=true&resolution=D&lang=vi&theme=light"></iframe></div>
        </div>

        <div class="sidebar-section">
            <div id="display_symbol" class="vps-widget-header">VN30F1M</div>
            <div id="display_desc" class="vps-widget-sub">Hợp đồng tương lai chỉ số VN30</div>
            <div id="display_price" class="vps-main-price">---.--</div>
            <div id="display_change" class="vps-change">--.-- (--.--%)</div>
            <div class="info-row"><span class="info-label">Mở cửa</span><span id="val_open" class="info-value">---.--</span></div>
            <div class="info-row"><span class="info-label">Cao nhất</span><span id="val_high" class="info-value">---.--</span></div>
            <div class="info-row"><span class="info-label">Thấp nhất</span><span id="val_low" class="info-value">---.--</span></div>
            <div class="info-row"><span class="info-label">Tham chiếu</span><span id="val_prev" class="info-value">---.--</span></div>
            
            <div style="margin-top: 20px; border-top: 2px solid #e0e3eb; padding-top: 10px;">
                <div style="font-weight: bold; margin-bottom: 5px;">Bước giá (Real-time)</div>
                <div id="order_book_container" style="font-family: monospace; font-size: 12px;">
                    <div id="ob_asks" style="color: #d50000;">Đang tải...</div>
                    <div id="ob_bids" style="color: #00c853;"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    let currentSymbol = 'VN30F1M';
    let apiInterval = null;
    let ws = null;
    const VERCEL_PROXY = "https://phucbinhscalping-github-io.vercel.app/api/vps-data";

    window.onload = function() {
        fetchVPSData();
        apiInterval = setInterval(fetchVPSData, 2000); 
        initOrderBookSocket();
    };

    function switchTab(event, blockId, symbol) {
        document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.tab-content-block').forEach(block => block.classList.remove('active'));
        document.getElementById(blockId).classList.add('active');
        
        currentSymbol = symbol;
        document.getElementById('display_symbol').innerText = symbol;
        document.getElementById('display_desc').innerText = symbol === 'VN30F1M' ? "Hợp đồng tương lai chỉ số VN30" : "Chỉ số VN-Index Việt Nam";
        
        document.getElementById('display_price').innerText = "⏳...";
        fetchVPSData();
    }

    async function fetchVPSData() {
        try {
            const response = await fetch(`${VERCEL_PROXY}?symbol=${currentSymbol}`);
            const data = await response.json();
            
            if (data && data.s === "ok" && data.c && data.c.length > 0) {
                const len = data.c.length;
                const currentPrice = data.c[len - 1];
                const sessionOpenPrice = data.o[0];
                let sessionHighPrice = data.h[0];
                let sessionLowPrice = data.l[0];
                for (let i = 0; i < len; i++) {
                    if (data.h[i] > sessionHighPrice) sessionHighPrice = data.h[i];
                    if (data.l[i] < sessionLowPrice) sessionLowPrice = data.l[i];
                }
                const referencePrice = data.o[0]; 
                const diff = currentPrice - referencePrice;
                const pct = (diff / referencePrice) * 100;
                const prefix = diff > 0 ? "↑ +" : (diff < 0 ? "↓ " : "");
                let tradeColor = "color-ref";
                if (diff > 0) tradeColor = "color-up";
                if (diff < 0) tradeColor = "color-down";
                const pEl = document.getElementById('display_price');
                const cEl = document.getElementById('display_change');
                pEl.innerText = Number(currentPrice).toFixed(2);
                pEl.className = `vps-main-price ${tradeColor}`;
                document.getElementById('display_symbol').className = `vps-widget-header ${tradeColor}`;
                cEl.innerText = `${prefix}${diff.toFixed(2)} (${pct.toFixed(2)}%)`;
                cEl.className = `vps-change ${tradeColor}`;
                document.getElementById('val_open').innerText = Number(sessionOpenPrice).toFixed(2);
                document.getElementById('val_high').innerText = Number(sessionHighPrice).toFixed(2);
                document.getElementById('val_low').innerText = Number(sessionLowPrice).toFixed(2);
                document.getElementById('val_prev').innerText = Number(referencePrice).toFixed(2);
            }
        } catch (err) {
            console.error("Lỗi kết nối:", err);
        }
    }

    function initOrderBookSocket() {
        const socket = io("https://tradingviewrealtime.vps.com.vn", {
            transports: ['websocket'],
            path: '/socket.io'
        });

        socket.on('connect', () => {
            console.log("Đã kết nối Socket!");
            socket.emit('sub', { symbol: currentSymbol });
        });

        socket.on('message', (data) => {
            if(data && data.asks && data.bids) {
                updateOrderBookUI(data);
            }
        });
    }


    async function update10gia() {
        const apiUrl = 'https://bgapidatafeed.vps.com.vn/getps10pricesnapshot/41I1G7000,B';
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(apiUrl);
        
        try {
            const res = await fetch(proxyUrl);
            const rawData = await res.json();
            
            // LOG ĐỂ BẠN KIỂM TRA DỮ LIỆU THỰC TẾ
            console.log("Dữ liệu nhận được từ VPS:", rawData);
            
            const tbody = document.getElementById('data-body');
            if (!tbody) return; // Nếu chưa tìm thấy bảng thì dừng
            
            tbody.innerHTML = '';
            
            // Xử lý dữ liệu dựa trên cấu trúc thường thấy của VPS
            // Nếu rawData là một object chứa list, hãy đổi thành rawData.list hoặc rawData.data
            const list = Array.isArray(rawData) ? rawData : (rawData.data || []);
            
            list.forEach(item => {
                // Kiểm tra tên các key trong Console log nếu vẫn ra undefined
                const p = item.p || item.price || item.Price || 0;
                const v = item.v || item.vol || item.Volume || 0;
                
                tbody.innerHTML += `<tr>
                    <td>${p}</td>
                    <td>${v}</td>
                </tr>`;
            });
        } catch (error) {
            console.error("Lỗi cập nhật:", error);
        }
    }
    
    
    function updateOrderBookUI(data) {
        document.getElementById('ob_asks').innerHTML = data.asks.slice(0, 5)
            .map(i => `Bán: ${i.price} - ${i.vol}`).join('<br>');
        document.getElementById('ob_bids').innerHTML = data.bids.slice(0, 5)
            .map(i => `Mua: ${i.price} - ${i.vol}`).join('<br>');
    }

    function addNewChart() {
        const id = "chart_" + Date.now();
        const symbol = "VN30F1M";
        const res = "D";
        const newTab = document.createElement("button");
        newTab.className = "tab-item";
        newTab.innerHTML = `📊 ${symbol} (${res}) <span class="close-btn" id="btn_${id}">×</span>`;
        newTab.onclick = (e) => switchTab(e, id, symbol);
        document.getElementById("mainTabMenu").insertBefore(newTab, document.querySelector(".btn-add"));
        const newContent = document.createElement("div");
        newContent.id = id;
        newContent.className = "tab-content-block";
        newContent.innerHTML = `<div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=${symbol}&allowFullscreen=true&resolution=${res}&lang=vi&theme=light"></iframe></div>`;
        document.getElementById("mainContent").insertBefore(newContent, document.querySelector(".sidebar-section"));
        document.getElementById(`btn_${id}`).addEventListener('click', function(e) {
            e.stopPropagation();
            newTab.remove();
            newContent.remove();
            document.querySelectorAll('.tab-item')[0].click();
        });
        newTab.click();
    }
</script>
</body>
</html>
